<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VERDE • Pauta do dia</title>
    <link rel="icon" type="image/x-icon" href="../../img/favicon.ico" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        :root {
            --verde: #2bb673;
            --verde-escuro: #1f8d58;
            --cinza-bg: #f5f6f7;
        }

        body {
            background: var(--cinza-bg);
        }

        .app-header {
            background: #14b88a;
            color: #fff;
            padding: .6rem 0;
        }

        .app-header .brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .page-title {
            font-weight: 700;
            color: #1f2937;
            margin-left: 13%;
        }
    </style>
</head>

<body>

    <!-- Header (simplificado para o protótipo) -->
    <header class="app-header">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="brand d-flex align-items-center gap-2">
                <i class="bi bi-grid-3x3-gap-fill"></i>
                <span>VERDE • Pauta do Dia</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <a href="https://wiki.verde.rj.def.br" target="_blank" class="text-white text-decoration-none"><i
                        class="bi bi-book"></i> Wiki</a>
                <div class="dropdown">
                    <button class="btn btn-sm btn-light dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle" id="usuLogado"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <div id="redirectGestao">
                            <li><a class="dropdown-item" href="../gerenciar-alertas/index.html">Gerenciamento de
                                    Alertas</a></li>
                            <li>
                                <hr class="dropdown-divider">
                        </div>
                        <li>
                            <a class="dropdown-item" href="../meus-alertas/index.html">Meus Alertas</a>
                        </li>
                        <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" id="botaoSair" href="../login/index.html">Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <h1 class="page-title h3 mb-3">Pauta do Dia</h1>

        <div class="card shadow-sm text-center mx-auto" style="max-width: 962px; align-self: center;">
            <img src="../../img/pauta-do-dia.png" class="card-img" alt="Pauta do dia">
        </div>


        <!-- Container para modais -->
        <div id="alertas-container"></div>

        <!-- Toasts -->
        <div class="position-fixed top-0 end-0 p-3" id="toast-container" style="z-index: 1080">
            <!-- Salvo com sucesso -->
            <div id="toastOK" class="toast align-items-center text-bg-success border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body">✅ Ciência Marcada com Sucesso!</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
                </div>
            </div>

            <!-- Erro -->
            <div id="toastErro" class="toast align-items-center text-bg-dark border-0 mt-2" role="alert">
                <div class="d-flex">
                    <div class="toast-body">❌ Operação não permitida para este alerta.</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
                </div>
            </div>

        </div>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./index.js"></script>
    <script type="module" src="../../monitor-alertas.js"></script>

</body>

</html>
