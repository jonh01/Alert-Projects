<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página dos Alertas — VERDE</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --verde: #2bb673;
      --verde-escuro: #1f8d58;
      --cinza-bg: #f5f6f7;
    }
    body { background: var(--cinza-bg); }
    .app-header {
      background: #14b88a;
      color: #fff;
      padding: .6rem 0;
    }
    .page-title {
      font-weight: 700;
      color: #1f2937;
    }
    .table thead th {
      background: #eef7f2;
    }
    .badge-ativo {
      background: #e8fff4;
      color: #0b8a4a;
      border: 1px solid #a9ebc9;
    }
    .badge-inativo {
      background: #fff0f0;
      color: #a11;
      border: 1px solid #f3b7b7;
    }
  </style>
</head>
<body>

    <!-- Header (simplificado para o protótipo) -->
  <header class="app-header">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="brand d-flex align-items-center gap-2">
        <i class="bi bi-grid-3x3-gap-fill"></i>
        <span>VERDE • Meus Alertas</span>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="https://wiki.verde.rj.def.br" target="_blank" class="text-white text-decoration-none"><i
            class="bi bi-book"></i> Wiki</a>
        <div class="dropdown">
          <button class="btn btn-sm btn-light dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle" id="usuLogado"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <div id="redirectGestao" >
                <li><a class="dropdown-item" href="../gerenciar-alertas/index.html">Gestão de Alertas</a></li>
            <li>
              <hr class="dropdown-divider">
            </div>
            </li>
            <li><a class="dropdown-item" id="botaoSair" href="../login/index.html">Sair</a></li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <h1 class="page-title h3 mb-3">Meus Alertas</h1>

    <!-- Filtros -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form id="formFiltros" class="row g-3 align-items-end">
          <div class="col-12 col-md-4">
            <label class="form-label">Data (início)</label>
            <input type="date" class="form-control" id="fDataInicio">
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Até</label>
            <input type="date" class="form-control" id="fDataFim">
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Tipo de Órgão</label>
            <select id="fTipoOrgao" class="form-select">
              <option value="TODOS" selected>TODOS</option>
              <option value="NPA">NÚCLEO DE PRIMEIRO ATENDIMENTO</option>
              <option value="AS3">AÇÃO SOCIAL 3</option>
              <option value="PLANTAO">PLANTÃO DIURNO</option>
            </select>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Status</label>
            <select id="fStatus" class="form-select">
              <option value="ATIVOS" selected>ATIVOS</option>
              <option value="INATIVOS">INATIVOS</option>
              <option value="AMBOS">AMBOS</option>
            </select>
          </div>
          <div class="col-12 col-md-8 d-flex gap-2 justify-content-md-end">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-search"></i> Buscar
            </button>
            <button type="button" class="btn btn-outline-secondary" id="btnLimparFiltros">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Resultados -->
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0" id="tabelaAlertas">
            <thead>
              <tr>
                <th style="width:120px;">Data</th>
                <th style="width:200px;">Título</th>
                <th>Descrição</th>
                <th style="width:120px;">Status</th>
                <th style="width:150px;">Ciência</th>
              </tr>
            </thead>
            <tbody>
              <!-- Linhas demo -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./index.js"></script>

</body>
</html>
