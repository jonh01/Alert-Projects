<!doctype html>
<html lang="pt-BR" data-bs-theme="auto">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema Verde</title>
  <link rel="icon" type="image/x-icon" href="../../img/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url("../../img/fundoSistema.png");
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .1);
      padding: 2rem;
      min-width: 280px;
    }

    footer {
      background: #fff;
      border-top: 3px solid #14b88a;
      padding: .6rem 2rem;
      font-size: .85rem;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="row justify-content-center align-items-center gap-5">
      <div class="col">
        <div class="login-card text-center py-lg-4">
          <img src="../../img/logo_login.png" alt="Logo Verde" class="img-fluid mb-2">
          <a href="https://wiki.verde.rj.def.br" target="_blank" class="d-block text-decoration-none">Wiki Verde</a>
        </div>
      </div>
      <div class="col">
        <div class="login-card py-lg-5">
          <form id="loginForm">
            <div class="mb-3">
              <label for="matriculaInput" class="form-label">Login</label>
              <input type="text" id="matriculaInput" class="form-control" placeholder="0001" required>
            </div>
            <div class="mb-3">
              <label for="passwordInput" class="form-label">Senha</label>
              <input type="password" id="passwordInput" class="form-control" placeholder="***" required>
            </div>
            <div class="row gap-2">
              <button type="submit" class="col-5 btn btn-success">Entrar</button>
              <button type="button" class="col btn btn-outline-secondary" disabled>Esqueci Minha Senha</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </main>

  <footer class="d-flex justify-content-end align-items-center gap-5">
    <div class="d-flex align-items-center">
      <img src="../../img/logo-defensoria-reduzido.png" alt="Logo Defensoria">
    </div>
    <div>
      <span class="badge bg-success">COSSIJ-0.0.2</span>
    </div>
  </footer>

  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080">
    <div id="toastLogin" class="toast align-items-center text-bg-warning  border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastLoginConteudo">
          alertar
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./index.js"></script>
</body>

</html>
