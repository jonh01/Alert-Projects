<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gerenciamento de Alertas - Sistema Verde</title>
    <link rel="icon" type="image/x-icon" href="../../img/favicon.ico" />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons (opcional, só para ícones) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --verde: #2bb673;
        --verde-escuro: #1f8d58;
        --cinza-bg: #f5f6f7;
      }

      body {
        background: var(--cinza-bg);
      }

      .app-header {
        background: #14b88a;
        /* barra tipo VERDE */
        color: #fff;
        padding: 0.6rem 0;
      }

      .app-header .brand {
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .page-title {
        font-weight: 700;
        color: #1f2937;
      }

      .card-filtros .card-header {
        background: #fff;
        border-bottom: 0;
        padding-bottom: 0;
      }

      .btn-verde {
        background: var(--verde);
        color: #fff;
        border-color: var(--verde);
      }

      .btn-verde:hover {
        background: var(--verde-escuro);
        border-color: var(--verde-escuro);
      }

      .form-text-muted {
        font-size: 0.8rem;
        color: #6b7280;
      }

      .table thead th {
        background: #eef7f2;
      }

      .badge-ativo {
        background: #e8fff4;
        color: #0b8a4a;
        border: 1px solid #a9ebc9;
      }

      .badge-inativo {
        background: #fff0f0;
        color: #a11;
        border: 1px solid #f3b7b7;
      }

      .dropdown-checklist .dropdown-menu {
        max-height: 260px;
        overflow: auto;
        padding: 0.5rem 0.75rem;
        width: 320px;
      }

      #btnOrgaos.is-invalid {
        border-color: #dc3545;
      }
    </style>
  </head>

  <body>
    <!-- Header (simplificado para o protótipo) -->
    <header class="app-header">
      <div class="container d-flex align-items-center justify-content-between">
        <div class="brand d-flex align-items-center gap-2">
          <i class="bi bi-grid-3x3-gap-fill"></i>
          <span>VERDE • Gerenciamento de Alertas</span>
        </div>
        <div class="d-flex align-items-center gap-3">
          <a
            href="https://wiki.verde.rj.def.br"
            target="_blank"
            class="text-white text-decoration-none"
            ><i class="bi bi-book"></i> Wiki</a
          >
          <div class="dropdown">
            <button
              class="btn btn-sm btn-light dropdown-toggle"
              data-bs-toggle="dropdown"
            >
              <i class="bi bi-person-circle" id="usuLogado"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item" href="../meus-alertas/index.html"
                  >Meus Alertas</a
                >
              </li>
              <li>
                <hr class="dropdown-divider" />
              </li>
              <li>
                <a
                  class="dropdown-item"
                  id="botaoSair"
                  href="../login/index.html"
                  >Sair</a
                >
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <main class="container my-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="page-title h3 mb-0">Gerenciamento de Alertas</h1>
        <button class="btn btn-verde" id="btnNovoAlerta">
          <i class="bi bi-plus-lg me-1"></i> Novo alerta
        </button>
      </div>

      <!-- Filtros -->
      <div class="card card-filtros shadow-sm mb-4">
        <div class="card-header">
          <h2 class="h6 text-muted mb-3">Filtros</h2>
        </div>
        <div class="card-body">
          <form id="formFiltros" class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">Data do alerta (início)</label>
              <input type="date" class="form-control" id="fDataInicio" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Até</label>
              <input type="date" class="form-control" id="fDataFim" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Tipo de Órgão</label>
              <select id="fTipoOrgao" class="form-select">
                <option value="TODOS" selected>Todos</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Status</label>
              <select id="fStatus" class="form-select">
                <option value="TODOS" selected>Todos</option>
                <option value="VIGENTE">Vigentes</option>
                <option value="FINALIZADO">Finalizados</option>
                <option value="EM_ELABORACAO">Em Elaboração</option>
              </select>
            </div>
            <div class="col-12 col-md-8 d-flex gap-2 justify-content-md-end">
              <button type="submit" class="btn btn-success">
                <i class="bi bi-search"></i> Buscar
              </button>
              <button
                type="button"
                class="btn btn-outline-secondary"
                id="btnLimparFiltros"
              >
                Limpar Seleção
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Resultados -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table
              class="table table-hover align-middle mb-0"
              id="tabelaAlertas"
            >
              <thead>
                <tr>
                  <th style="width: 150px">Data de Criação</th>
                  <th style="width: 210px">Título</th>
                  <th>Descrição</th>
                  <th style="width: 200px">Publico Alvo</th>
                  <th style="width: 120px">Status</th>
                  <th style="width: 120px" class="text-center">Ações</th>
                </tr>
              </thead>
              <tbody id="tbodyAlert">
                <!-- Linhas demo -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal: Criar Alerta -->
    <div class="modal" id="modalCriarAlerta" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bi bi-megaphone me-2 text-success"></i>Criar Alerta
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Fechar"
            ></button>
          </div>
          <form id="formAlerta">
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label">Título do alerta</label>
                  <input
                    type="text"
                    class="form-control"
                    id="aTitulo"
                    required
                  />
                </div>

                <div class="col-12">
                  <label class="form-label">Descrição</label>
                  <textarea
                    class="form-control"
                    rows="4"
                    id="aDescricao"
                    required
                  ></textarea>
                </div>

                <div class="col-12">
                  <label class="form-label d-block mb-1">
                    Tipo de alerta
                    <i
                      class="bi bi-info-circle ms-1 text-muted"
                      data-bs-toggle="tooltip"
                      data-bs-placement="right"
                      title="• Pop-up aparece no topo direito para quem está logado. • Modal é apresentado no login até o usuário clicar em ESTOU CIENTE."
                    ></i>
                  </label>

                  <div
                    class="btn-group"
                    role="group"
                    aria-label="Tipo de alerta"
                  >
                    <input
                      type="radio"
                      class="btn-check"
                      name="aTipo"
                      id="aTipoPopup"
                      value="popup"
                      autocomplete="off"
                    />
                    <label class="btn btn-outline-success" for="aTipoPopup"
                      >Pop-up</label
                    >

                    <input
                      type="radio"
                      class="btn-check"
                      name="aTipo"
                      id="aTipoModal"
                      value="modal"
                      autocomplete="off"
                    />
                    <label class="btn btn-outline-success" for="aTipoModal"
                      >Modal</label
                    >

                    <input
                      type="radio"
                      class="btn-check"
                      name="aTipo"
                      id="aTipoAmbos"
                      value="ambos"
                      autocomplete="off"
                      checked
                    />
                    <label class="btn btn-outline-success" for="aTipoAmbos"
                      >Ambos</label
                    >
                  </div>
                </div>

                <!-- Tipo de órgão: dropdown com checkboxes -->
                <div class="col-12">
                  <label class="form-label">
                    Tipo de Órgão
                    <i
                      class="bi bi-info-circle ms-1 text-muted"
                      data-bs-toggle="tooltip"
                      title="Ao marcar Todos, todos os tipos são selecionados."
                    ></i>
                  </label>
                  <div class="dropdown dropdown-checklist">
                    <button
                      class="btn btn-outline-secondary dropdown-toggle w-100 text-start"
                      type="button"
                      data-bs-toggle="dropdown"
                      id="btnOrgaos"
                    ></button>
                    <div
                      class="dropdown-menu"
                      aria-labelledby="btnOrgaos"
                      id="tipoOrgaoDinamico"
                    >
                      <div class="form-check ms-1">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          value="todos"
                          id="orgao_todos"
                          checked
                        />
                        <label
                          class="form-check-label fw-semibold"
                          for="orgao_todos"
                          >Todos</label
                        >
                      </div>
                      <hr class="my-2" />
                    </div>
                  </div>
                </div>

                <!-- Horário do alerta -->
                <div class="col-12 col-md-6">
                  <label class="form-label">
                    Data/hora do disparo
                    <i
                      class="bi bi-info-circle ms-1 text-muted"
                      data-bs-toggle="tooltip"
                      title="Agende o disparo do alerta."
                    ></i>
                  </label>
                  <input
                    type="datetime-local"
                    class="form-control"
                    id="aData"
                  />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label d-block"
                    >Opção de disparo
                    <i
                      class="bi bi-info-circle ms-1 text-muted"
                      data-bs-toggle="tooltip"
                      title="Se marcado, o alerta dispara ao finalizar."
                    ></i
                  ></label>
                  <div class="form-check mt-2">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="aInstantaneo"
                    />
                    <label class="form-check-label" for="aInstantaneo"
                      >Instantâneo</label
                    >
                  </div>
                </div>

                <!-- Vigência (habilita só para modal/ambos) -->
                <div class="col-12 col-md-6">
                  <label class="form-label"
                    >Vigência até
                    <i
                      class="bi bi-info-circle ms-1 text-muted"
                      data-bs-toggle="tooltip"
                      title="Habilitado para Modal ou Ambos."
                    ></i
                  ></label>
                  <input
                    type="datetime-local"
                    class="form-control"
                    id="aVigencia"
                  />
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button
                class="btn btn-outline-secondary"
                id="btnCancelar"
                type="button"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>
              <button class="btn btn-primary" type="button" id="btnSalvar">
                <i class="bi bi-save2 me-1"></i>Salvar
              </button>
              <button class="btn btn-verde" type="submit" id="btnFinalizar">
                <i class="bi bi-send-check me-1"></i>Finalizar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Toasts -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080">
      <div
        id="toastOK"
        class="toast align-items-center text-bg-success border-0"
        role="alert"
      >
        <div class="d-flex">
          <div class="toast-body">✅ Alerta salvo com sucesso.</div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
      <div
        id="toastFinalizado"
        class="toast align-items-center text-bg-primary border-0 mt-2"
        role="alert"
      >
        <div class="d-flex">
          <div class="toast-body">
            🚀 Alerta finalizado e lançado/programado.
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./index.js"></script>
  </body>
</html>
